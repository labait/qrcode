[build]
  command = "npm run build"
  publish = "dist"

# Evita che la shell SPA resti vecchia dopo deploy (specialmente su browser mobili).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
