[build]
  command = "npm run build"
  publish = "dist"

# firebase-admin non va bundled (grpc, protobuf, ecc.)
[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "firebase-admin",
    "@google-cloud/firestore",
    "google-gax",
    "@grpc/grpc-js",
  ]

# Evita che la shell SPA resti vecchia dopo deploy (specialmente su browser mobili).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
